[project]
name = "acpremote"
dynamic = ["version"]
description = "Generic remote WebSocket transport for ACP agents and clients."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache 2.0" }
dependencies = [
    "agent-client-protocol>=0.9.0",
    "typing-extensions>=4.12.0",
    "websockets>=16.0",
]

[project.optional-dependencies]
perf = ["uvloop>=0.21.0; platform_system != 'Windows'"]

[project.urls]
Homepage = "https://vcoderun.github.io/acpkit/acpremote/"
Issues = "https://github.com/vcoderun/acpkit/issues"
Repository = "https://github.com/vcoderun/acpkit"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.version]
path = "src/acpremote/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/acpremote"]
