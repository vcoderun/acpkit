default_install_hook_types: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml
        args: [--unsafe]
        stages: [pre-commit, pre-push]
      - id: check-toml
        stages: [pre-commit, pre-push]

  - repo: local
    hooks:
      - id: check-pypi-version-ordering
        name: ensure local package versions are ahead of PyPI
        entry: uv run --extra dev python3.11 scripts/check_pypi_versions.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: ruff-check-fix
        name: ruff check --fix
        entry: uv run --extra dev ruff check --fix
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: check-coverage
        name: save and check coverage thresholds for major changes
        entry: python3.11 scripts/run_if_major_change.py --stage pre-commit -- make save-coverage
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: make-prod
        name: verify build for major changes
        entry: python3.11 scripts/run_if_major_change.py --stage pre-commit -- make prod
        language: system
        pass_filenames: false
        stages: [pre-commit]
